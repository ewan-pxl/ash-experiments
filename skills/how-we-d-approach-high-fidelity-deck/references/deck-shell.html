<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>How We'd Approach Zebra — Pixel Theory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2C0F44;
    --ink-2:#3a1559;
    --yellow:#FEC200;
    --lilac:#CFAEED;
    --violet:#9224E9;
    --cream:#FAF6EE;
    --card:#FFFFFF;
    --line-l:rgba(44,15,68,.09);
    --mut-l:rgba(44,15,68,.52);
    --body-l:rgba(44,15,68,.72);
    --mut-d:rgba(207,174,237,.74);
    --line-d:rgba(255,255,255,.13);
    --mono:'Geist Mono',ui-monospace,'SF Mono',Menlo,monospace;
    --display:'Funnel Display','Helvetica Neue',Arial,sans-serif;
    --body:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }

  *{box-sizing:border-box}
  html{scroll-snap-type:y proximity;scroll-behavior:smooth}
  body{
    margin:0;
    background:#160823;
    font-family:var(--body);
    padding:28px 20px 60px;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  /* ---------- slide shell ---------- */
  .slide{
    position:relative;
    width:min(100%,1180px);
    margin:0 auto 22px;
    aspect-ratio:16/9;
    container-type:size;
    overflow:hidden;
    border-radius:14px;
    box-shadow:0 36px 90px -46px rgba(0,0,0,.75);
    scroll-snap-align:center;
    display:flex;
    flex-direction:column;
    padding:4.7cqw 4.9cqw 4cqw;
  }

  .is-light{background-color:var(--cream);color:var(--ink)}
  .is-dark{
    color:#fff;
    background-color:#2C0F44;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(255,255,255,.06) 1px, transparent 0),
      radial-gradient(88% 72% at 74% 14%, rgba(208,121,66,.50), rgba(158,68,84,.16) 41%, transparent 65%),
      radial-gradient(135% 125% at 20% 104%, var(--ink-2) 0%, var(--ink) 52%);
    background-size:24px 24px,100% 100%,100% 100%;
  }

  /* ---------- header / footer rails ---------- */
  .rail{display:flex;justify-content:space-between;align-items:flex-start;gap:2cqw}
  .logo-svg{height:2.55cqw;width:15cqw;display:block}
  .is-dark .logo-svg{color:#fff}
  .is-light .logo-svg{color:var(--ink)}

  .meta{font-family:var(--mono);font-size:1.02cqw;font-weight:500;letter-spacing:.16em;text-transform:uppercase}
  .is-dark .meta{color:var(--mut-d)}
  .is-light .meta{color:var(--mut-l)}

  .foot{
    display:flex;justify-content:space-between;align-items:center;gap:2cqw;
    font-family:var(--mono);font-size:.86cqw;font-weight:500;letter-spacing:.16em;text-transform:uppercase;
  }
  .is-dark .foot{color:rgba(207,174,237,.5)}
  .is-light .foot{color:rgba(44,15,68,.4)}
  .foot span:nth-child(2){flex:1;text-align:center}
  .foot span:last-child{text-align:right}

  .body{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:0}
  .body.top{justify-content:flex-start}

  /* ---------- type ---------- */
  .eyebrow{font-family:var(--mono);font-size:1.04cqw;font-weight:600;letter-spacing:.2em;text-transform:uppercase}
  .eyebrow .y{color:var(--yellow)}
  .eyebrow .l{color:var(--lilac)}
  .is-light .eyebrow{color:var(--mut-l)}

  h1,h2{font-family:var(--display);font-weight:600;margin:0;letter-spacing:-.01em}
  h1{font-size:7.4cqw;line-height:.95}
  h2{font-size:5.55cqw;line-height:.99}
  .accent{color:var(--yellow)}

  .lede{font-size:1.55cqw;line-height:1.5;font-weight:400;max-width:42cqw}
  .is-light .lede{color:var(--body-l)}
  .is-dark .lede{color:var(--mut-d)}

  /* split header used on content slides */
  .head-split{display:grid;grid-template-columns:1.04fr .96fr;gap:3cqw;align-items:center}
  .head-split .lede{max-width:none;padding-bottom:.4cqw}

  /* ---------- cards ---------- */
  .cards{display:grid;gap:1.5cqw;margin-top:3.2cqw}
  .c3{grid-template-columns:repeat(3,1fr)}
  .c4{grid-template-columns:repeat(4,1fr)}

  .card{
    background:var(--card);border-radius:1.5cqw;padding:1.95cqw 1.8cqw;
    border:1px solid var(--line-l);
    box-shadow:0 1px 0 rgba(44,15,68,.03),0 20px 42px -30px rgba(44,15,68,.35);
    display:flex;flex-direction:column;
  }
  .card.feature{
    background:var(--ink);border-color:transparent;color:#fff;
    transform:translateY(-1.1cqw);
    box-shadow:0 30px 60px -28px rgba(44,15,68,.6);
  }

  .clabel{font-family:var(--mono);font-size:.92cqw;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--mut-l);line-height:1.35}
  .feature .clabel{color:var(--yellow)}

  .stat{font-family:var(--display);font-weight:600;font-size:5.2cqw;line-height:1;letter-spacing:-.02em;margin:.2cqw 0 1.2cqw}
  .feature .stat{color:var(--yellow)}
  .csub{font-size:1.12cqw;line-height:1.42;color:var(--body-l);margin-top:auto}
  .feature .csub{color:rgba(255,255,255,.82)}

  .divider{height:1px;background:var(--line-l);margin:1.3cqw 0}
  .feature .divider{background:rgba(255,255,255,.16)}

  .pill{
    align-self:flex-start;display:inline-flex;align-items:center;gap:.5cqw;
    background:var(--yellow);color:var(--ink);
    font-family:var(--mono);font-size:.86cqw;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    padding:.5cqw .9cqw;border-radius:5cqw;margin-bottom:1.1cqw;
  }
  .pill .dot{width:.6cqw;height:.6cqw;border-radius:50%;background:var(--ink)}

  .card.note .ct{font-family:var(--display);font-weight:600;font-size:1.85cqw;line-height:1.08;margin-bottom:.8cqw}
  .card.note .csub{margin-top:0}

  /* numbered cards (approach) */
  .num-card .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2.6cqw}
  .num-card .kicker{font-family:var(--mono);font-size:.92cqw;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--mut-l)}
  .badge{
    width:2.7cqw;height:2.7cqw;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-weight:600;font-size:1.05cqw;background:var(--ink);color:#fff;
  }
  .badge.y{background:var(--yellow);color:var(--ink)}
  .num-card .ct{font-family:var(--display);font-weight:600;font-size:1.95cqw;line-height:1.05;margin-bottom:.9cqw}
  .num-card .csub{margin-top:0}

  /* skip cards */
  .skip-card{border-style:dashed;border-color:rgba(44,15,68,.18);background:rgba(255,255,255,.55);box-shadow:none}
  .skip-card .xmark{
    width:2.5cqw;height:2.5cqw;border-radius:50%;border:1.4px solid rgba(44,15,68,.35);
    display:flex;align-items:center;justify-content:center;color:var(--mut-l);font-size:1.3cqw;margin-bottom:1.6cqw;
  }
  .skip-card .ct{font-family:var(--display);font-weight:600;font-size:1.85cqw;line-height:1.08;margin-bottom:.8cqw;color:rgba(44,15,68,.78)}
  .skip-card .csub{margin-top:0}

  /* ---------- editorial numbered rows (ops ideas) ---------- */
  .rows{margin-top:1.5cqw;display:flex;flex-direction:column}
  .rows.two{display:grid;grid-auto-flow:column;grid-template-rows:repeat(3,auto);column-gap:5.5cqw;align-content:start;margin-top:1.9cqw}
  .rows.two .row{border-bottom:none}
  .rows.two .rd{max-width:none}
  .row{display:grid;grid-template-columns:5cqw 1fr;gap:2.4cqw;align-items:baseline;padding:0.98cqw 0;border-top:1px solid var(--line-l)}
  .row:last-child{border-bottom:1px solid var(--line-l)}
  .row .rn{font-family:var(--display);font-weight:600;font-size:2.6cqw;line-height:1;color:rgba(44,15,68,.22)}
  .row.lead .rn{color:var(--yellow)}
  .row .rt{font-family:var(--display);font-weight:600;font-size:1.78cqw;line-height:1.05;margin-bottom:.45cqw}
  .row .rd{font-size:1.18cqw;line-height:1.45;color:var(--body-l);max-width:64cqw}
  .row .grid2{display:grid;grid-template-columns:auto 1fr;gap:0}

  /* ---------- dark checklist (close) ---------- */
  .asks{display:grid;grid-template-columns:1fr 1fr;gap:1.1cqw 3.4cqw;margin-top:3cqw}
  .ask{display:grid;grid-template-columns:2.5cqw 1fr;gap:1.4cqw;align-items:start;padding:.7cqw 0}
  .ask .an{
    width:2.5cqw;height:2.5cqw;border-radius:50%;background:var(--yellow);color:var(--ink);
    font-family:var(--mono);font-weight:700;font-size:1cqw;display:flex;align-items:center;justify-content:center;flex:none;
  }
  .ask .ad{font-size:1.28cqw;line-height:1.4;color:rgba(255,255,255,.9);padding-top:.35cqw}
  .ask .ad b{color:#fff;font-weight:600}
  .close-line{margin-top:3cqw;font-size:1.5cqw;line-height:1.5;color:var(--lilac);max-width:62cqw}

  /* ---------- print ---------- */
  @media print{
    body{background:#fff;padding:0}
    .slide{width:100%;max-width:none;margin:0;border-radius:0;box-shadow:none;break-after:page;page-break-after:always}
    @page{size:landscape;margin:0}
  }
</style>
</head>

<!-- SLIDES -->


<script>
  // light keyboard navigation, deck-style
  const slides = [...document.querySelectorAll('.slide')];
  function current(){
    const mid = window.scrollY + window.innerHeight/2;
    let best=0,bd=Infinity;
    slides.forEach((s,i)=>{const c=s.offsetTop+s.offsetHeight/2;const d=Math.abs(c-mid);if(d<bd){bd=d;best=i;}});
    return best;
  }
  addEventListener('keydown',e=>{
    if(['ArrowDown','ArrowRight','PageDown',' '].includes(e.key)){e.preventDefault();const n=Math.min(current()+1,slides.length-1);slides[n].scrollIntoView({behavior:'smooth',block:'center'});}
    if(['ArrowUp','ArrowLeft','PageUp'].includes(e.key)){e.preventDefault();const n=Math.max(current()-1,0);slides[n].scrollIntoView({behavior:'smooth',block:'center'});}
  });
</script>
